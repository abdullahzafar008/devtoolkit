backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  - name: "pages"
    label: "📄 Pages"
    files:

      - label: "🏠 Homepage"
        name: "homepage"
        file: "content/homepage.json"
        fields:
          - label: "Hero Heading"
            name: "hero_heading"
            widget: "string"
            hint: "Main big heading on homepage"
          - label: "Hero Subheading"
            name: "hero_subheading"
            widget: "text"
            hint: "Text below main heading"
          - label: "Button 1 Text"
            name: "btn1_text"
            widget: "string"
          - label: "Button 1 Link"
            name: "btn1_link"
            widget: "string"
          - label: "Button 2 Text"
            name: "btn2_text"
            widget: "string"
          - label: "Button 2 Link"
            name: "btn2_link"
            widget: "string"
          - label: "Stats Bar"
            name: "stats"
            widget: "list"
            fields:
              - {label: "Icon", name: "icon",
                 widget: "string"}
              - {label: "Value", name: "value",
                 widget: "string"}
              - {label: "Label", name: "label",
                 widget: "string"}
          - label: "FAQ Heading"
            name: "faq_heading"
            widget: "string"
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - {label: "Question",
                 name: "question",
                 widget: "string"}
              - {label: "Answer",
                 name: "answer",
                 widget: "text"}

      - label: "ℹ️ About Page"
        name: "about"
        file: "content/about.json"
        fields:
          - label: "Page Heading"
            name: "heading"
            widget: "string"
          - label: "Our Story"
            name: "story"
            widget: "markdown"
          - label: "Mission Cards"
            name: "mission_cards"
            widget: "list"
            fields:
              - {label: "Icon", name: "icon",
                 widget: "string"}
              - {label: "Title", name: "title",
                 widget: "string"}
              - {label: "Description",
                 name: "description",
                 widget: "text"}

      - label: "📞 Contact Page"
        name: "contact"
        file: "content/contact.json"
        fields:
          - label: "Page Heading"
            name: "heading"
            widget: "string"
          - label: "Subheading"
            name: "subheading"
            widget: "text"
          - label: "Email Address"
            name: "email"
            widget: "string"
          - label: "Response Time"
            name: "response_time"
            widget: "string"
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - {label: "Question",
                 name: "question",
                 widget: "string"}
              - {label: "Answer",
                 name: "answer",
                 widget: "text"}

      - label: "🔒 Privacy Policy"
        name: "privacy"
        file: "content/privacy.json"
        fields:
          - label: "Page Heading"
            name: "heading"
            widget: "string"
          - label: "Last Updated"
            name: "last_updated"
            widget: "string"
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - {label: "Section Heading",
                 name: "heading",
                 widget: "string"}
              - {label: "Content",
                 name: "content",
                 widget: "markdown"}

      - label: "📋 Terms of Service"
        name: "terms"
        file: "content/terms.json"
        fields:
          - label: "Page Heading"
            name: "heading"
            widget: "string"
          - label: "Last Updated"
            name: "last_updated"
            widget: "string"
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - {label: "Section Heading",
                 name: "heading",
                 widget: "string"}
              - {label: "Content",
                 name: "content",
                 widget: "markdown"}

  - name: "categories"
    label: "📂 Categories"
    files:

      - label: "🔍 SEO Tools"
        name: "seo"
        file: "content/categories/seo.json"
        fields:
          - {label: "Hero Heading",
             name: "hero_heading",
             widget: "string"}
          - {label: "Hero Subheading",
             name: "hero_subheading",
             widget: "text"}
          - {label: "SEO Title",
             name: "seo_title",
             widget: "string"}
          - {label: "SEO Description",
             name: "seo_description",
             widget: "text"}
          - {label: "Overview Heading",
             name: "overview_heading",
             widget: "string"}
          - {label: "Overview Text",
             name: "overview_text",
             widget: "markdown"}
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - {label: "Question",
                 name: "question",
                 widget: "string"}
              - {label: "Answer",
                 name: "answer",
                 widget: "text"}

      - label: "✍️ Text Tools"
        name: "text"
        file: "content/categories/text.json"
        fields:
          - {label: "Hero Heading",
             name: "hero_heading",
             widget: "string"}
          - {label: "Hero Subheading",
             name: "hero_subheading",
             widget: "text"}
          - {label: "SEO Title",
             name: "seo_title",
             widget: "string"}
          - {label: "SEO Description",
             name: "seo_description",
             widget: "text"}
          - {label: "Overview Text",
             name: "overview_text",
             widget: "markdown"}
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - {label: "Question",
                 name: "question",
                 widget: "string"}
              - {label: "Answer",
                 name: "answer",
                 widget: "text"}

      - label: "🖼️ Image Tools"
        name: "image"
        file: "content/categories/image.json"
        fields:
          - {label: "Hero Heading",
             name: "hero_heading",
             widget: "string"}
          - {label: "Hero Subheading",
             name: "hero_subheading",
             widget: "text"}
          - {label: "SEO Title",
             name: "seo_title",
             widget: "string"}
          - {label: "SEO Description",
             name: "seo_description",
             widget: "text"}
          - {label: "Overview Text",
             name: "overview_text",
             widget: "markdown"}
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - {label: "Question",
                 name: "question",
                 widget: "string"}
              - {label: "Answer",
                 name: "answer",
                 widget: "text"}

      - label: "🎬 Video Tools"
        name: "video"
        file: "content/categories/video.json"
        fields:
          - {label: "Hero Heading",
             name: "hero_heading",
             widget: "string"}
          - {label: "Hero Subheading",
             name: "hero_subheading",
             widget: "text"}
          - {label: "SEO Title",
             name: "seo_title",
             widget: "string"}
          - {label: "SEO Description",
             name: "seo_description",
             widget: "text"}
          - {label: "Overview Text",
             name: "overview_text",
             widget: "markdown"}
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - {label: "Question",
                 name: "question",
                 widget: "string"}
              - {label: "Answer",
                 name: "answer",
                 widget: "text"}

      - label: "🧑💻 Developer Tools"
        name: "developer"
        file: "content/categories/developer.json"
        fields:
          - {label: "Hero Heading",
             name: "hero_heading",
             widget: "string"}
          - {label: "Hero Subheading",
             name: "hero_subheading",
             widget: "text"}
          - {label: "SEO Title",
             name: "seo_title",
             widget: "string"}
          - {label: "SEO Description",
             name: "seo_description",
             widget: "text"}
          - {label: "Overview Text",
             name: "overview_text",
             widget: "markdown"}
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - {label: "Question",
                 name: "question",
                 widget: "string"}
              - {label: "Answer",
                 name: "answer",
                 widget: "text"}

      - label: "🔄 Converter Tools"
        name: "converter"
        file: "content/categories/converter.json"
        fields:
          - {label: "Hero Heading",
             name: "hero_heading",
             widget: "string"}
          - {label: "Hero Subheading",
             name: "hero_subheading",
             widget: "text"}
          - {label: "SEO Title",
             name: "seo_title",
             widget: "string"}
          - {label: "SEO Description",
             name: "seo_description",
             widget: "text"}
          - {label: "Overview Text",
             name: "overview_text",
             widget: "markdown"}
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - {label: "Question",
                 name: "question",
                 widget: "string"}
              - {label: "Answer",
                 name: "answer",
                 widget: "text"}

  - name: "tools"
    label: "🔧 Tools"
    folder: "content/tools"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Tool Name", name: "title",
         widget: "string"}
      - {label: "Slug", name: "slug",
         widget: "string"}
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - {label: "SEO Tools",
             value: "seo"}
          - {label: "Text Tools",
             value: "text"}
          - {label: "Image Tools",
             value: "image"}
          - {label: "Video Tools",
             value: "video"}
          - {label: "Developer Tools",
             value: "developer"}
          - {label: "Converter Tools",
             value: "converter"}
      - {label: "Emoji", name: "emoji",
         widget: "string"}
      - {label: "Short Description",
         name: "description",
         widget: "text"}
      - {label: "Long Description",
         name: "long_description",
         widget: "markdown"}
      - {label: "Active", name: "active",
         widget: "boolean",
         default: true}
      - {label: "SEO Title",
         name: "seo_title",
         widget: "string"}
      - {label: "SEO Description",
         name: "seo_description",
         widget: "text"}
      - label: "How To Use Steps"
        name: "how_to_use"
        widget: "list"
        fields:
          - {label: "Step Title",
             name: "title",
             widget: "string"}
          - {label: "Step Description",
             name: "description",
             widget: "text"}
      - label: "FAQs"
        name: "faqs"
        widget: "list"
        fields:
          - {label: "Question",
             name: "question",
             widget: "string"}
          - {label: "Answer",
             name: "answer",
             widget: "text"}

  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "content/settings.json"
        fields:
          - {label: "Site Name",
             name: "site_name",
             widget: "string"}
          - {label: "Tagline",
             name: "tagline",
             widget: "string"}
          - {label: "Contact Email",
             name: "contact_email",
             widget: "string"}
          - label: "Stats Bar"
            name: "stats"
            widget: "list"
            fields:
              - {label: "Icon", name: "icon",
                 widget: "string"}
              - {label: "Value", name: "value",
                 widget: "string"}
              - {label: "Label", name: "label",
                 widget: "string"}
          - label: "Social Links"
            name: "social"
            widget: "object"
            fields:
              - {label: "Twitter",
                 name: "twitter",
                 widget: "string",
                 required: false}
              - {label: "Facebook",
                 name: "facebook",
                 widget: "string",
                 required: false}
              - {label: "Instagram",
                 name: "instagram",
                 widget: "string",
                 required: false}
              - {label: "YouTube",
                 name: "youtube",
                 widget: "string",
                 required: false}
