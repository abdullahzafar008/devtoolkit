backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "content/homepage.json"
        fields:
          - {label: "Hero Heading", name: "hero_heading", widget: "string"}
          - {label: "Hero Subheading", name: "hero_subheading", widget: "text"}
          - {label: "Button 1 Text", name: "btn1_text", widget: "string"}
          - {label: "Button 2 Text", name: "btn2_text", widget: "string"}

      - label: "About Page"
        name: "about"
        file: "content/about.json"
        fields:
          - {label: "Heading", name: "heading", widget: "string"}
          - {label: "Story", name: "story", widget: "markdown"}

      - label: "Contact Page"
        name: "contact"
        file: "content/contact.json"
        fields:
          - {label: "Heading", name: "heading", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General"
        name: "general"
        file: "content/settings.json"
        fields:
          - {label: "Site Name", name: "site_name", widget: "string"}
          - {label: "Tagline", name: "tagline", widget: "string"}
          - {label: "Contact Email", name: "contact_email", widget: "string"}
